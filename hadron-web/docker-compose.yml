services:
  hadron-web:
    build:
      context: .
      args:
        VITE_AUTH_MODE: ${AUTH_MODE:-azure_ad}
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://hadron:${DB_PASSWORD:-hadron_dev}@db:5432/hadron
      AUTH_MODE: ${AUTH_MODE:-azure_ad}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
      STATIC_DIR: /app/static
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: hadron
      POSTGRES_USER: hadron
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hadron_dev}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hadron -d hadron"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: unless-stopped

volumes:
  pgdata:
