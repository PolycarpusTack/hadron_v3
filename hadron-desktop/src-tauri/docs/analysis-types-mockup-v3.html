                                                        {obj.segmentCount && <div><span className="text-slate-500">Segments:</span> <span className="text-slate-800">{obj.segmentCount}</span></div>}
                                                        {obj.durationCount !== undefined && <div><span className="text-slate-500">Durations:</span> <span className={obj.durationCount < obj.segmentCount ? 'text-red-600 font-bold' : 'text-slate-800'}>{obj.durationCount}</span></div>}
                                                        {obj.name && <div><span className="text-slate-500">Name:</span> <span className="text-slate-800">{obj.name}</span></div>}
                                                        {obj.region && <div><span className="text-slate-500">Region:</span> <span className="text-slate-800">{obj.region}</span></div>}
                                                    </div>
                                                    {obj.durations && (
                                                        <div className="mt-2 text-sm">
                                                            <span className="text-slate-500">Durations:</span> <span className="font-mono text-slate-800">[{obj.durations.join(', ')}]</span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </Section>

                                    <Section title="Time Allocations" icon={Clock} defaultOpen={true}>
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="bg-slate-100">
                                                    <th className="px-3 py-2 text-left">Position</th>
                                                    <th className="px-3 py-2 text-left">Type</th>
                                                    <th className="px-3 py-2 text-left">Start</th>
                                                    <th className="px-3 py-2 text-left">Duration</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {analysis.contextArguments.timeAllocations.map((ta, i) => (
                                                    <tr key={i} className={`border-b ${ta.duration === 'nil' ? 'bg-red-50' : ''}`}>
                                                        <td className="px-3 py-2 font-mono">{ta.position}</td>
                                                        <td className="px-3 py-2">{ta.type}</td>
                                                        <td className="px-3 py-2 font-mono">{ta.start}</td>
                                                        <td className={`px-3 py-2 font-mono ${ta.duration === 'nil' ? 'text-red-600 font-bold' : ''}`}>{ta.duration}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </Section>
                                </div>
                            )}

                            {/* ENVIRONMENT TAB */}
                            {activeTab === 'environment' && (
                                <div className="grid grid-cols-2 gap-6">
                                    <Section title="Application" icon={Monitor} defaultOpen={true}>
                                        <InfoGrid items={[
                                            ['User', analysis.environment.user],
                                            ['Site', analysis.environment.site],
                                            ['Version', analysis.environment.version],
                                            ['Build', analysis.environment.build]
                                        ]} />
                                    </Section>
                                    <Section title="Platform" icon={Server} defaultOpen={true}>
                                        <InfoGrid items={[
                                            ['Smalltalk', analysis.environment.smalltalkVersion],
                                            ['Computer', analysis.environment.computerName],
                                            ['Timezone', analysis.environment.timeZone],
                                            ['Frame Rate', analysis.environment.frameRate]
                                        ]} />
                                    </Section>
                                    <Section title="Database" icon={Database} defaultOpen={true}>
                                        <InfoGrid items={[
                                            ['Server', analysis.environment.oracleServer],
                                            ['Client', analysis.environment.oracleClient],
                                            ['Encoding', analysis.environment.dbEncoding],
                                            ['DB Hash', analysis.environment.dbHash]
                                        ]} />
                                    </Section>
                                    <Section title="Active Process" icon={Cpu} defaultOpen={true}>
                                        <InfoGrid items={[
                                            ['Process', analysis.activeProcess.name],
                                            ['Priority', analysis.activeProcess.priority],
                                            ['Hash', analysis.activeProcess.hash]
                                        ]} />
                                    </Section>
                                </div>
                            )}

                            {/* DATABASE TAB */}
                            {activeTab === 'database' && (
                                <div className="space-y-4">
                                    <Section title="Connections" icon={Database} defaultOpen={true}>
                                        <table className="w-full text-sm">
                                            <thead>
                                                <tr className="bg-slate-100">
                                                    <th className="px-3 py-2 text-left">Hash</th>
                                                    <th className="px-3 py-2 text-left">State</th>
                                                    <th className="px-3 py-2 text-left">User</th>
                                                    <th className="px-3 py-2 text-left">Last Operation</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {analysis.database.connections.map((c, i) => (
                                                    <tr key={i} className="border-b">
                                                        <td className="px-3 py-2 font-mono">{c.hash}</td>
                                                        <td className="px-3 py-2">
                                                            <span className={`px-2 py-0.5 rounded text-xs ${c.state === 'xactYes' ? 'bg-yellow-100 text-yellow-800' : c.state === 'xactNo' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}`}>{c.state}</span>
                                                        </td>
                                                        <td className="px-3 py-2">{c.username}</td>
                                                        <td className="px-3 py-2 text-slate-600 text-xs">{c.lastOp}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        {analysis.database.connections.some(c => c.state === 'xactYes') && (
                                            <div className="mt-3 p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                                                <p className="text-sm text-yellow-800"><AlertTriangle className="w-4 h-4 inline mr-1" /><strong>Warning:</strong> Active transaction detected - data may not have been saved</p>
                                            </div>
                                        )}
                                    </Section>

                                    <Section title="Active Sessions" icon={Activity} defaultOpen={true}>
                                        <div className="space-y-2">
                                            {analysis.database.activeSessions.map((s, i) => (
                                                <div key={i} className="bg-slate-50 rounded-lg p-3">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <span className="px-2 py-0.5 bg-blue-100 text-blue-800 rounded text-xs">{s.state}</span>
                                                    </div>
                                                    <pre className="text-xs text-slate-600 font-mono whitespace-pre-wrap">{s.query}</pre>
                                                </div>
                                            ))}
                                        </div>
                                    </Section>
                                </div>
                            )}

                            {/* MEMORY TAB */}
                            {activeTab === 'memory' && (
                                <div className="space-y-4">
                                    <div className="grid grid-cols-5 gap-4">
                                        {[
                                            { name: 'Eden', ...analysis.memory.eden },
                                            { name: 'Survivor', ...analysis.memory.survivor },
                                            { name: 'Large', ...analysis.memory.large },
                                            { name: 'Old', ...analysis.memory.old },
                                            { name: 'Perm', ...analysis.memory.perm }
                                        ].map(m => (
                                            <div key={m.name} className={`rounded-lg p-4 text-center ${m.percent >= 100 ? 'bg-amber-50 border border-amber-200' : 'bg-slate-50'}`}>
                                                <p className="text-xs text-slate-500 mb-1">{m.name}</p>
                                                <p className={`text-2xl font-bold ${m.percent >= 100 ? 'text-amber-700' : m.percent > 70 ? 'text-yellow-600' : 'text-slate-800'}`}>{m.percent.toFixed(1)}%</p>
                                                <div className="mt-2 h-2 bg-slate-200 rounded-full overflow-hidden">
                                                    <div className={`h-full rounded-full ${m.percent > 90 ? 'bg-red-500' : m.percent > 70 ? 'bg-yellow-500' : 'bg-green-500'}`} style={{ width: `${Math.min(m.percent, 100)}%` }} />
                                                </div>
                                                <p className="text-xs text-slate-500 mt-2">{m.size}</p>
                                                {m.percent >= 100 && <p className="text-xs text-amber-600 mt-1 font-medium">⚠️ Full</p>}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-slate-50 rounded-lg p-4">
                                        <InfoGrid items={[
                                            ['Total Used', analysis.memory.total],
                                            ['Config Limit', analysis.memory.configLimit],
                                            ['Growth Limit', analysis.memory.growthLimit]
                                        ]} />
                                    </div>

                                    <Section title="Processes" icon={Cpu} defaultOpen={true}>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <h4 className="text-sm font-medium text-slate-700 mb-2">Quiescent ({analysis.processes.quiescent.length})</h4>
                                                <div className="space-y-1">
                                                    {analysis.processes.quiescent.map((p, i) => (
                                                        <div key={i} className="bg-green-50 rounded p-2 flex justify-between text-sm">
                                                            <span>{p.name}</span>
                                                            <span className="text-slate-500">Priority: {p.priority}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <h4 className="text-sm font-medium text-slate-700 mb-2">Suspended ({analysis.processes.suspended.length})</h4>
                                                <div className="space-y-1">
                                                    {analysis.processes.suspended.map((p, i) => (
                                                        <div key={i} className="bg-yellow-50 rounded p-2 flex justify-between text-sm">
                                                            <span>{p.name}</span>
                                                            <span className="text-slate-500">Priority: {p.priority}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </Section>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Open Windows */}
                    <div className="mt-4 bg-white rounded-xl border border-slate-200 p-4">
                        <h3 className="font-medium text-slate-700 mb-3 flex items-center gap-2"><Monitor className="w-4 h-4" /> Open Windows at Crash ({analysis.windows.length})</h3>
                        <div className="grid grid-cols-3 gap-3">
                            {analysis.windows.map(w => (
                                <div key={w.id} className="bg-slate-50 rounded-lg p-3">
                                    <p className="text-sm text-slate-800 truncate">{w.title}</p>
                                    <p className="text-xs text-slate-500 font-mono">{w.model}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </>
            );
        };

        // ========== QUICK ANALYSIS VIEW ==========
        const QuickAnalysisView = ({ data }) => {
            return (
                <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                    <div className="p-6 max-h-[650px] overflow-y-auto space-y-5">
                        {/* Section 1: Root Cause */}
                        <div className="bg-gradient-to-r from-red-50 to-orange-50 border border-red-200 rounded-xl p-5">
                            <h3 className="font-semibold text-red-800 mb-3 flex items-center gap-2">
                                <div className="p-2 bg-red-100 rounded-lg"><Search className="w-5 h-5 text-red-600" /></div>
                                Root Cause
                            </h3>
                            <p className="text-slate-700 mb-4">{data.rootCause.explanation}</p>
                            <div className="bg-slate-900 rounded-lg p-4">
                                <pre className="text-green-400 font-mono text-sm whitespace-pre-wrap">{data.rootCause.stackTrace.join('\n')}</pre>
                            </div>
                        </div>

                        {/* Section 2: Workaround */}
                        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-5">
                            <h3 className="font-semibold text-yellow-800 mb-3 flex items-center gap-2">
                                <div className="p-2 bg-yellow-100 rounded-lg"><Shield className="w-5 h-5 text-yellow-600" /></div>
                                {data.workaround.title}
                            </h3>
                            <ol className="list-decimal list-inside space-y-2 text-slate-700 mb-4">
                                {data.workaround.steps.map((step, i) => (
                                    <li key={i}>{step}</li>
                                ))}
                            </ol>
                            <div className="bg-white rounded-lg p-3 border border-yellow-300">
                                <p className="text-sm text-yellow-800"><Lightbulb className="w-4 h-4 inline mr-1" /><strong>Tip:</strong> {data.workaround.note}</p>
                            </div>
                        </div>

                        {/* Section 3: Solution */}
                        <div className="bg-gradient-to-br from-emerald-50 to-teal-50 border border-emerald-200 rounded-xl p-5">
                            <h3 className="font-semibold text-emerald-800 mb-4 flex items-center gap-2">
                                <div className="p-2 bg-emerald-100 rounded-lg"><Wrench className="w-5 h-5 text-emerald-600" /></div>
                                Solution
                            </h3>
                            {data.solution.fixes.map((fix, i) => (
                                <div key={i} className={`bg-white rounded-lg p-4 mb-3 border ${fix.priority === 'P0' ? 'border-red-200' : 'border-orange-200'}`}>
                                    <div className="flex items-center justify-between mb-2">
                                        <div className="flex items-center gap-2">
                                            <span className={`px-2 py-0.5 rounded text-xs font-bold ${fix.priority === 'P0' ? 'bg-red-100 text-red-800' : 'bg-orange-100 text-orange-800'}`}>{fix.priority}</span>
                                            <span className="font-medium text-slate-800">{fix.title}</span>
                                        </div>
                                        <span className="text-xs text-slate-500">{fix.effort}</span>
                                    </div>
                                    <p className="text-sm text-slate-600 mb-3">{fix.description}</p>
                                    {fix.code && (
                                        <pre className="bg-slate-900 text-green-400 p-3 rounded text-xs overflow-x-auto">{fix.code}</pre>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* Section 4: Explanation */}
                        <div className="bg-blue-50 border border-blue-200 rounded-xl p-5">
                            <h3 className="font-semibold text-blue-800 mb-3 flex items-center gap-2">
                                <div className="p-2 bg-blue-100 rounded-lg"><Lightbulb className="w-5 h-5 text-blue-600" /></div>
                                Why This Fix Works
                            </h3>
                            <p className="text-slate-700 mb-3">{data.explanation.whyItWorks}</p>
                            <p className="text-slate-600 text-sm mb-3">{data.explanation.details}</p>
                            <div className="bg-white rounded-lg p-3">
                                <p className="text-sm font-medium text-slate-700 mb-2">Key Points:</p>
                                <ul className="space-y-1">
                                    {data.explanation.keyPoints.map((point, i) => (
                                        <li key={i} className="flex items-center gap-2 text-sm text-slate-600">
                                            <CheckCircle className="w-4 h-4 text-green-600 flex-shrink-0" />
                                            {point}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ========== MAIN APP ==========
        const App = () => {
            const [files, setFiles] = useState([]);
            const [selectedFile, setSelectedFile] = useState(null);
            const [analysisResults, setAnalysisResults] = useState({});
            const [analysisType, setAnalysisType] = useState('comprehensive');

            const loadDemoFiles = () => {
                const demoFiles = [
                    { id: 'demo1', name: 'WCR_15-1_10-29-30.txt', size: '781 KB', status: 'pending' },
                    { id: 'demo2', name: 'WCR_15-1_10-49-22.txt', size: '772 KB', status: 'pending' },
                    { id: 'demo3', name: 'WCR_15-1_10-49-30.txt', size: '774 KB', status: 'pending' }
                ];
                setFiles(demoFiles);
            };

            const analyzeFile = (fileId) => {
                setFiles(prev => prev.map(f => f.id === fileId ? { ...f, status: 'analyzing' } : f));
                const delay = analysisType === 'quick' ? 800 : 2000;
                setTimeout(() => {
                    setFiles(prev => prev.map(f => f.id === fileId ? { ...f, status: 'complete', analysisType } : f));
                    const file = files.find(f => f.id === fileId);
                    setAnalysisResults(prev => ({
                        ...prev,
                        [fileId]: {
                            type: analysisType,
                            comprehensive: { ...mockCrashAnalysis, fileName: file?.name || mockCrashAnalysis.fileName },
                            quick: quickAnalysisData
                        }
                    }));
                    setSelectedFile(fileId);
                }, delay);
            };

            const removeFile = (fileId) => {
                setFiles(prev => prev.filter(f => f.id !== fileId));
                if (selectedFile === fileId) setSelectedFile(null);
            };

            const analysis = selectedFile ? analysisResults[selectedFile] : null;
            const currentType = analysis?.type || analysisType;

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
                    <header className="bg-white border-b border-slate-200 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-blue-600 rounded-lg"><Zap className="w-6 h-6 text-white" /></div>
                                    <div>
                                        <h1 className="text-xl font-bold text-slate-800">Hadron Crash Analyzer</h1>
                                        <p className="text-sm text-slate-500">VisualWorks Smalltalk Diagnostic Tool</p>
                                    </div>
                                </div>
                                <button className="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2">
                                    <Download className="w-4 h-4" /> Export Report
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto px-6 py-6">
                        <div className="grid grid-cols-12 gap-6">
                            {/* LEFT PANEL - File Upload */}
                            <div className="col-span-3">
                                {/* Analysis Type Selector */}
                                <div className="bg-white rounded-xl border border-slate-200 p-4 mb-4">
                                    <h3 className="text-sm font-medium text-slate-700 mb-3">Analysis Type</h3>
                                    <div className="space-y-2">
                                        <button onClick={() => setAnalysisType('comprehensive')}
                                            className={`w-full p-3 rounded-lg border-2 text-left transition-all ${analysisType === 'comprehensive' ? 'border-blue-500 bg-blue-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                            <div className="flex items-center justify-between">
                                                <span className="font-medium text-sm">Comprehensive</span>
                                                {analysisType === 'comprehensive' && <CheckCircle className="w-4 h-4 text-blue-600" />}
                                            </div>
                                            <div className="flex items-center gap-2 mt-1 text-xs text-slate-500">
                                                <span className="flex items-center gap-1"><DollarSign className="w-3 h-3" />~$2.50</span>
                                                <span className="flex items-center gap-1"><Clock className="w-3 h-3" />15-30s</span>
                                            </div>
                                        </button>
                                        <button onClick={() => setAnalysisType('quick')}
                                            className={`w-full p-3 rounded-lg border-2 text-left transition-all ${analysisType === 'quick' ? 'border-green-500 bg-green-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                            <div className="flex items-center justify-between">
                                                <span className="font-medium text-sm">Quick</span>
                                                {analysisType === 'quick' && <CheckCircle className="w-4 h-4 text-green-600" />}
                                            </div>
                                            <div className="flex items-center gap-2 mt-1 text-xs text-slate-500">
                                                <span className="flex items-center gap-1"><DollarSign className="w-3 h-3" />~$0.50</span>
                                                <span className="flex items-center gap-1"><Clock className="w-3 h-3" />5-10s</span>
                                            </div>
                                        </button>
                                    </div>
                                </div>

                                {/* Drop Zone */}
                                <div onClick={loadDemoFiles} className="border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer bg-white">
                                    <Upload className="w-10 h-10 text-slate-400 mx-auto mb-3" />
                                    <p className="text-sm font-medium text-slate-700">Drop crash files here</p>
                                    <p className="text-xs text-slate-500 mt-1">or click to load demo</p>
                                </div>

                                {/* File List */}
                                {files.length > 0 && (
                                    <div className="mt-4 bg-white rounded-xl border border-slate-200 overflow-hidden">
                                        <div className="px-4 py-3 bg-slate-50 border-b border-slate-200">
                                            <span className="text-sm font-medium text-slate-700">Files ({files.length})</span>
                                        </div>
                                        <div className="divide-y divide-slate-100 max-h-72 overflow-y-auto">
                                            {files.map(file => (
                                                <div key={file.id}
                                                    className={`px-4 py-3 flex items-center gap-3 hover:bg-slate-50 cursor-pointer ${selectedFile === file.id ? 'bg-blue-50 border-l-4 border-blue-500' : ''}`}
                                                    onClick={() => file.status === 'complete' && setSelectedFile(file.id)}>
                                                    <FileText className={`w-5 h-5 ${file.status === 'complete' ? 'text-green-600' : 'text-slate-400'}`} />
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-sm font-medium text-slate-700 truncate">{file.name}</p>
                                                        <p className="text-xs text-slate-500">{file.size}</p>
                                                    </div>
                                                    {file.status === 'pending' && (
                                                        <button onClick={(e) => { e.stopPropagation(); analyzeFile(file.id); }}
                                                            className="text-xs px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">Analyze</button>
                                                    )}
                                                    {file.status === 'analyzing' && <div className="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin" />}
                                                    {file.status === 'complete' && <CheckCircle className="w-5 h-5 text-green-600" />}
                                                    <button onClick={(e) => { e.stopPropagation(); removeFile(file.id); }}
                                                        className="text-slate-400 hover:text-red-600"><Trash2 className="w-4 h-4" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* RIGHT PANEL - Analysis Results */}
                            <div className="col-span-9">
                                {!analysis ? (
                                    <div className="bg-white rounded-xl border border-slate-200 p-12 text-center">
                                        <Activity className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                                        <h3 className="text-lg font-medium text-slate-700 mb-2">No Analysis Selected</h3>
                                        <p className="text-sm text-slate-500 mb-4">Upload and analyze a crash file to see diagnostics</p>
                                        <button onClick={loadDemoFiles} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Load Demo Files</button>
                                    </div>
                                ) : (
                                    <>
                                        {/* Crash Header */}
                                        <div className="bg-white rounded-xl border border-slate-200 p-4 mb-4">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-red-100 rounded-lg"><AlertTriangle className="w-6 h-6 text-red-600" /></div>
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <h2 className="text-lg font-bold text-slate-800">{analysis.comprehensive.exception.type}</h2>
                                                            <SeverityBadge severity={analysis.comprehensive.severity} />
                                                            <span className={`px-2 py-0.5 rounded text-xs ${currentType === 'comprehensive' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}`}>
                                                                {currentType === 'comprehensive' ? 'Comprehensive' : 'Quick'}
                                                            </span>
                                                        </div>
                                                        <p className="text-sm text-slate-500">{analysis.comprehensive.fileName} • {analysis.comprehensive.header.timestamp}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right text-sm text-slate-500">
                                                    User: <span className="font-medium text-slate-800">{analysis.comprehensive.environment.user}</span><br />
                                                    Site: <span className="font-medium text-slate-800">{analysis.comprehensive.environment.site}</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Analysis View */}
                                        {currentType === 'comprehensive' ? (
                                            <ComprehensiveAnalysisView analysis={analysis.comprehensive} />
                                        ) : (
                                            <QuickAnalysisView data={analysis.quick} />
                                        )}
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
