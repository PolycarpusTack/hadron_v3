<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadron Analysis Types - Mockup v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .step-connector { position: absolute; left: 19px; top: 40px; bottom: 0; width: 2px; background: #e2e8f0; }
        .step-item:last-child .step-connector { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // Icons
        const Icon = ({ path, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                {path}
            </svg>
        );

        const Zap = (props) => <Icon {...props} path={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />;
        const AlertTriangle = (props) => <Icon {...props} path={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
        const CheckCircle = (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const XCircle = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>} />;
        const ChevronDown = (props) => <Icon {...props} path={<polyline points="6 9 12 15 18 9"/>} />;
        const ChevronRight = (props) => <Icon {...props} path={<polyline points="9 18 15 12 9 6"/>} />;
        const Server = (props) => <Icon {...props} path={<><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></>} />;
        const Database = (props) => <Icon {...props} path={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>} />;
        const MemoryStick = (props) => <Icon {...props} path={<><path d="M6 19v-3"/><path d="M10 19v-3"/><path d="M14 19v-3"/><path d="M18 19v-3"/><path d="M8 11V9"/><path d="M16 11V9"/><path d="M12 11V9"/><path d="M2 15h20"/><path d="M2 7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7z"/></>} />;
        const Layers = (props) => <Icon {...props} path={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;
        const BarChart3 = (props) => <Icon {...props} path={<><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>} />;
        const Box = (props) => <Icon {...props} path={<><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></>} />;
        const Target = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>} />;
        const TestTube = (props) => <Icon {...props} path={<><path d="M14.5 2v17.5c0 1.4-1.1 2.5-2.5 2.5h0c-1.4 0-2.5-1.1-2.5-2.5V2"/><path d="M8.5 2h7"/><path d="M14.5 16h-5"/></>} />;
        const Lightbulb = (props) => <Icon {...props} path={<><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>} />;
        const Users = (props) => <Icon {...props} path={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
        const Shield = (props) => <Icon {...props} path={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>} />;
        const Info = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />;
        const Wrench = (props) => <Icon {...props} path={<><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></>} />;
        const BookOpen = (props) => <Icon {...props} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
        const Copy = (props) => <Icon {...props} path={<><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>} />;
        const Terminal = (props) => <Icon {...props} path={<><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></>} />;
        const Play = (props) => <Icon {...props} path={<polygon points="5 3 19 12 5 21 5 3"/>} />;
        const Clock = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
        const DollarSign = (props) => <Icon {...props} path={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>} />;
        const Search = (props) => <Icon {...props} path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />;
        const ArrowRight = (props) => <Icon {...props} path={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />;

        // Mock data for comprehensive analysis
        const comprehensiveAnalysis = {
            summary: {
                title: "Nil receiver in schedule duration calculation",
                severity: "critical",
                category: "scheduling",
                confidence: "high",
                affectedWorkflow: "EPG Publication - 6PM primetime schedule for BBC One"
            },
            rootCause: {
                technical: "The BMProgramSegmentDurations>>calculateTotalDuration method attempted to send #asSeconds to a nil receiver. The nil originated from PSITxBlock>>endTime returning nil when the transmission block lacks a scheduled end time.",
                plainEnglish: "The system crashed while trying to calculate how long a TV program segment lasts. This happened because the schedule entry was missing its end time - the system expected complete timing information, but received only a start time.",
                affectedMethod: "BMProgramSegmentDurations>>calculateTotalDuration",
                affectedModule: "PSI.ScheduleEngine",
                triggerCondition: "PSITxBlock with nil endTime passed to duration calculator during EPG export"
            },
            userScenario: {
                workflow: "EPG Publication",
                steps: [
                    { step: 1, action: "User opens Schedule Manager", details: "Navigated to BBC One channel schedule", isCrashPoint: false },
                    { step: 2, action: "User imports from Traffic system", details: "Imported 47 entries, 3 had partial timing", isCrashPoint: false },
                    { step: 3, action: "User clicks 'Publish to EPG'", details: "System crashed on entry #23 with nil endTime", isCrashPoint: true }
                ],
                expectedResult: "EPG successfully published with calculated durations",
                actualResult: "MessageNotUnderstood: nil does not understand #asSeconds",
                reproductionLikelihood: "sometimes"
            },
            suggestedFixes: [
                {
                    priority: "P0",
                    title: "Add nil guard in duration calculator",
                    description: "Prevent crash by checking for nil before calculating duration",
                    codeBefore: `calculateTotalDuration
    | total |
    total := 0.
    segments do: [:seg |
        total := total + seg endTime asSeconds - seg startTime asSeconds].
    ^total`,
                    codeAfter: `calculateTotalDuration
    | total |
    total := 0.
    segments do: [:seg |
        seg endTime ifNil: [
            WOnScheduleWarning signal: 'Segment missing end time'.
            ^nil].
        total := total + seg endTime asSeconds - seg startTime asSeconds].
    ^total`,
                    effort: "~2 hours",
                    complexity: "low"
                },
                {
                    priority: "P1",
                    title: "Validate schedule entries on import",
                    description: "Add validation in traffic import to flag entries with incomplete timing",
                    effort: "~1 day",
                    complexity: "medium"
                }
            ],
            systemWarnings: [
                { source: "Memory", severity: "warning", title: "High OldSpace Usage", description: "OldSpace at 78% (1.2GB/1.5GB)", recommendation: "Monitor during peak hours" },
                { source: "Database", severity: "info", title: "Open Transaction", description: "WONPROD_47 has uncommitted changes", recommendation: "Verify data after restart" }
            ],
            impactAnalysis: {
                dataRisk: "low",
                directlyAffected: [
                    { feature: "EPG Publication", module: "PSI.EPGPublisher", severity: "critical" }
                ],
                potentiallyAffected: [
                    { feature: "Automation Playlist", module: "PL.PlaylistGenerator", severity: "medium" }
                ]
            },
            memoryAnalysis: {
                oldSpace: { used: "1.2GB", total: "1.5GB", percent: 78 },
                newSpace: { used: "50MB", total: "150MB", percent: 34 },
                permSpace: { used: "200MB", total: "200MB", percent: 100 }
            },
            databaseAnalysis: {
                sessions: [
                    { id: "WONPROD_47", status: "active", lastOp: "UPDATE PSI.PSITXBLOCK" }
                ],
                transactionState: "open"
            },
            testScenarios: [
                { id: "TC001", name: "EPG publish with nil end time", priority: "P0", type: "regression" },
                { id: "TC002", name: "Traffic import validation", priority: "P1", type: "integration" }
            ],
            stackTrace: [
                { frame: 0, method: "UndefinedObject>>doesNotUnderstand:", type: "error" },
                { frame: 1, method: "BMProgramSegmentDurations>>calculateTotalDuration", type: "error" },
                { frame: 2, method: "PSITxBlock>>durationInSeconds", type: "application" },
                { frame: 3, method: "PSI.EPGPublisher>>exportSchedule:", type: "application" },
                { frame: 4, method: "WOnTransaction>>execute:", type: "framework" }
            ],
            environment: {
                version: "WHATS'ON v7.5.2",
                platform: "Windows Server 2019",
                database: "Oracle 19c"
            }
        };

        // Mock data for quick analysis
        const quickAnalysis = {
            summary: {
                errorType: "MessageNotUnderstood",
                title: "Nil receiver in schedule duration calculation",
                severity: "critical",
                component: "BMProgramSegmentDurations",
                method: "calculateTotalDuration"
            },
            rootCause: {
                explanation: "The crash occurred because BMProgramSegmentDurations>>calculateTotalDuration tried to call #asSeconds on a nil value. The nil came from PSITxBlock>>endTime - this schedule entry was imported without an end time.",
                stackTrace: [
                    "UndefinedObject>>doesNotUnderstand: #asSeconds",
                    "BMProgramSegmentDurations>>calculateTotalDuration",
                    "PSITxBlock>>durationInSeconds",
                    "PSI.EPGPublisher>>exportSchedule:"
                ]
            },
            workaround: {
                steps: [
                    "Open Schedule Manager and locate affected entries",
                    "Manually set end times for entries showing empty end time",
                    "Re-run the EPG publication"
                ],
                note: "Run: SELECT * FROM psi_tx_blocks WHERE end_time IS NULL"
            },
            solution: {
                fixes: [
                    {
                        priority: "P0",
                        title: "Add nil guard in duration calculator",
                        description: "Check for nil before calculating duration",
                        code: `seg endTime ifNil: [
    self logWarning: 'Missing end time'.
    ^nil].`,
                        effort: "~2 hours"
                    },
                    {
                        priority: "P1",
                        title: "Validate on traffic import",
                        description: "Flag incomplete entries before they enter the system",
                        effort: "~1 day"
                    }
                ]
            },
            explanation: {
                whyItWorks: "The P0 fix adds defensive programming - checking for nil before using the value. Instead of crashing, the code now detects missing data, logs a warning, and returns nil for graceful handling.",
                keyPoints: [
                    "Detects the missing end time",
                    "Logs a warning for investigation",
                    "Returns nil to signal incomplete data"
                ]
            }
        };

        const SeverityBadge = ({ severity }) => {
            const colors = {
                critical: "bg-red-100 text-red-800 border-red-200",
                high: "bg-orange-100 text-orange-800 border-orange-200",
                medium: "bg-yellow-100 text-yellow-800 border-yellow-200",
                low: "bg-green-100 text-green-800 border-green-200",
                warning: "bg-yellow-100 text-yellow-800 border-yellow-200",
                info: "bg-blue-100 text-blue-800 border-blue-200",
                sometimes: "bg-yellow-100 text-yellow-800 border-yellow-200"
            };
            return <span className={`px-2 py-0.5 rounded-full text-xs font-medium border ${colors[severity] || colors.medium}`}>{severity.toUpperCase()}</span>;
        };

        const Section = ({ title, icon: IconComponent, children, defaultOpen = false, badge = null }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="border border-slate-200 rounded-lg mb-3 overflow-hidden bg-white">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full px-4 py-3 flex items-center justify-between bg-slate-50 hover:bg-slate-100 transition-colors">
                        <div className="flex items-center gap-3">
                            <IconComponent className="w-5 h-5 text-slate-600" />
                            <span className="font-medium text-slate-800">{title}</span>
                            {badge && <span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-xs">{badge}</span>}
                        </div>
                        {isOpen ? <ChevronDown className="w-5 h-5 text-slate-400" /> : <ChevronRight className="w-5 h-5 text-slate-400" />}
                    </button>
                    {isOpen && <div className="p-4 border-t border-slate-200">{children}</div>}
                </div>
            );
        };

        const StackFrame = ({ frame, method, type }) => {
            const colors = {
                error: "bg-red-50 border-red-200 text-red-800",
                application: "bg-blue-50 border-blue-200 text-blue-800",
                framework: "bg-slate-50 border-slate-200 text-slate-600"
            };
            return (
                <div className={`flex items-start gap-3 p-2 rounded border ${colors[type]} font-mono text-xs mb-1`}>
                    <span className="text-slate-400 w-6 text-right flex-shrink-0">[{frame}]</span>
                    <span className="flex-1 break-all">{method}</span>
                </div>
            );
        };

        // ========== COMPREHENSIVE ANALYSIS VIEW ==========
        const ComprehensiveAnalysisView = ({ data }) => {
            const [activeTab, setActiveTab] = useState('overview');
            const [expandedTests, setExpandedTests] = useState({});

            const tabs = [
                { id: 'overview', label: 'Overview', icon: BarChart3 },
                { id: 'testing', label: 'Testing & Impact', icon: TestTube },
                { id: 'stack', label: 'Stack Trace', icon: Layers },
                { id: 'system', label: 'System', icon: Server },
            ];

            return (
                <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                    <div className="flex border-b border-slate-200 overflow-x-auto">
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                className={`flex items-center gap-2 px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${activeTab === tab.id ? 'border-blue-600 text-blue-600 bg-blue-50' : 'border-transparent text-slate-600 hover:bg-slate-50'}`}>
                                <tab.icon className="w-4 h-4" />{tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="p-6 max-h-[600px] overflow-y-auto">
                        {/* OVERVIEW TAB */}
                        {activeTab === 'overview' && (
                            <div className="space-y-5">
                                {/* Plain English Explanation */}
                                <div className="bg-gradient-to-r from-red-50 to-orange-50 border border-red-200 rounded-xl p-5">
                                    <h3 className="font-semibold text-red-800 mb-2 flex items-center gap-2">
                                        <AlertTriangle className="w-5 h-5" /> What Happened
                                    </h3>
                                    <p className="text-red-700">{data.rootCause.plainEnglish}</p>
                                </div>

                                {/* System Warnings */}
                                {data.systemWarnings.length > 0 && (
                                    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
                                        <div className="px-4 py-3 bg-slate-700 flex items-center justify-between">
                                            <span className="font-medium text-white flex items-center gap-2"><Shield className="w-5 h-5" /> System Alerts</span>
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {data.systemWarnings.map((w, i) => (
                                                <div key={i} className={`p-4 ${w.severity === 'warning' ? 'bg-yellow-50' : 'bg-blue-50'}`}>
                                                    <div className="flex items-start gap-3">
                                                        {w.severity === 'warning' ? <AlertTriangle className="w-5 h-5 text-yellow-600" /> : <Info className="w-5 h-5 text-blue-600" />}
                                                        <div>
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <span className="font-medium text-slate-800">{w.title}</span>
                                                                <span className="px-2 py-0.5 bg-slate-200 rounded text-xs">{w.source}</span>
                                                            </div>
                                                            <p className="text-sm text-slate-600">{w.description}</p>
                                                            <p className="text-sm mt-1"><Lightbulb className="w-4 h-4 inline mr-1" />{w.recommendation}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* User Scenario / Reproduction */}
                                <div className="bg-white border border-slate-200 rounded-xl p-5">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="font-semibold text-slate-800 flex items-center gap-2"><Users className="w-5 h-5 text-blue-600" /> How to Reproduce</h3>
                                        <SeverityBadge severity={data.userScenario.reproductionLikelihood} />
                                    </div>
                                    <div className="space-y-2">
                                        {data.userScenario.steps.map((step, idx) => (
                                            <div key={idx} className={`flex gap-3 p-3 rounded-lg ${step.isCrashPoint ? 'bg-red-50 border-l-4 border-red-500' : 'bg-slate-50'}`}>
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${step.isCrashPoint ? 'bg-red-200' : 'bg-blue-100'}`}>
                                                    {step.isCrashPoint ? <AlertTriangle className="w-4 h-4 text-red-600" /> : <span className="text-blue-700 font-bold text-sm">{step.step}</span>}
                                                </div>
                                                <div>
                                                    <div className="font-medium text-slate-800">{step.action}</div>
                                                    <div className="text-sm text-slate-600">{step.details}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 mt-4">
                                        <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                                            <div className="flex items-center gap-2 mb-1"><CheckCircle className="w-4 h-4 text-green-600" /><span className="font-medium text-green-800 text-sm">Expected</span></div>
                                            <p className="text-sm text-green-700">{data.userScenario.expectedResult}</p>
                                        </div>
                                        <div className="bg-red-50 border border-red-200 rounded-lg p-3">
                                            <div className="flex items-center gap-2 mb-1"><XCircle className="w-4 h-4 text-red-600" /><span className="font-medium text-red-800 text-sm">Actual</span></div>
                                            <p className="text-sm text-red-700">{data.userScenario.actualResult}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Suggested Fixes */}
                                <div className="bg-gradient-to-br from-emerald-50 to-teal-50 border-2 border-emerald-300 rounded-xl overflow-hidden">
                                    <div className="px-4 py-3 bg-gradient-to-r from-emerald-600 to-teal-600">
                                        <span className="font-semibold text-white flex items-center gap-2"><Wrench className="w-5 h-5" /> Suggested Fixes</span>
                                    </div>
                                    <div className="p-5 space-y-4">
                                        {data.suggestedFixes.map((fix, i) => (
                                            <div key={i} className={`bg-white rounded-lg p-4 border ${fix.priority === 'P0' ? 'border-red-200' : 'border-orange-200'}`}>
                                                <div className="flex items-center justify-between mb-2">
                                                    <div className="flex items-center gap-2">
                                                        <span className={`px-2 py-0.5 rounded text-xs font-bold ${fix.priority === 'P0' ? 'bg-red-100 text-red-800' : 'bg-orange-100 text-orange-800'}`}>{fix.priority}</span>
                                                        <span className="font-medium text-slate-800">{fix.title}</span>
                                                    </div>
                                                    <span className="text-xs text-slate-500">{fix.effort}</span>
                                                </div>
                                                <p className="text-sm text-slate-600 mb-3">{fix.description}</p>
                                                {fix.codeBefore && (
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div>
                                                            <div className="text-xs text-slate-500 mb-1">Before</div>
                                                            <pre className="bg-slate-900 text-green-400 p-3 rounded text-xs overflow-x-auto">{fix.codeBefore}</pre>
                                                        </div>
                                                        <div>
                                                            <div className="text-xs text-slate-500 mb-1">After</div>
                                                            <pre className="bg-slate-900 text-green-400 p-3 rounded text-xs overflow-x-auto">{fix.codeAfter}</pre>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TESTING TAB */}
                        {activeTab === 'testing' && (
                            <div className="space-y-5">
                                <div className="bg-gradient-to-r from-slate-800 to-slate-900 rounded-xl p-6 text-white">
                                    <h3 className="text-lg font-semibold mb-4 flex items-center gap-2"><Target className="w-5 h-5" /> Impact Summary</h3>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                                            <div className="text-3xl font-bold text-red-400">{data.impactAnalysis.directlyAffected.length}</div>
                                            <div className="text-sm text-slate-300">Directly Affected</div>
                                        </div>
                                        <div className="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                                            <div className="text-3xl font-bold text-yellow-400">{data.impactAnalysis.potentiallyAffected.length}</div>
                                            <div className="text-sm text-slate-300">Potentially Affected</div>
                                        </div>
                                        <div className="bg-white bg-opacity-10 rounded-lg p-4 text-center">
                                            <div className="text-3xl font-bold text-blue-400">{data.testScenarios.length}</div>
                                            <div className="text-sm text-slate-300">Test Scenarios</div>
                                        </div>
                                    </div>
                                </div>

                                <Section title="Directly Affected" icon={XCircle} defaultOpen={true}>
                                    {data.impactAnalysis.directlyAffected.map((item, i) => (
                                        <div key={i} className="p-3 bg-red-50 border border-red-200 rounded-lg mb-2">
                                            <div className="flex justify-between">
                                                <span className="font-medium">{item.feature}</span>
                                                <SeverityBadge severity={item.severity} />
                                            </div>
                                            <span className="text-xs text-slate-500">{item.module}</span>
                                        </div>
                                    ))}
                                </Section>

                                <Section title="Test Scenarios" icon={TestTube} defaultOpen={true}>
                                    {data.testScenarios.map((tc, i) => (
                                        <div key={i} className="p-3 bg-slate-50 rounded-lg mb-2 flex items-center justify-between">
                                            <div className="flex items-center gap-2">
                                                <span className="font-mono text-xs text-slate-500">{tc.id}</span>
                                                <span className="font-medium">{tc.name}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <span className={`px-2 py-0.5 rounded text-xs ${tc.priority === 'P0' ? 'bg-red-100 text-red-800' : 'bg-orange-100 text-orange-800'}`}>{tc.priority}</span>
                                                <span className="px-2 py-0.5 bg-purple-100 text-purple-800 rounded text-xs">{tc.type}</span>
                                            </div>
                                        </div>
                                    ))}
                                </Section>
                            </div>
                        )}

                        {/* STACK TRACE TAB */}
                        {activeTab === 'stack' && (
                            <div className="space-y-2">
                                <div className="flex items-center gap-4 mb-4 text-xs">
                                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-red-200"></span> Error</span>
                                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-blue-200"></span> Application</span>
                                    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-slate-200"></span> Framework</span>
                                </div>
                                {data.stackTrace.map(frame => <StackFrame key={frame.frame} {...frame} />)}
                            </div>
                        )}

                        {/* SYSTEM TAB */}
                        {activeTab === 'system' && (
                            <div className="space-y-5">
                                <Section title="Memory" icon={MemoryStick} defaultOpen={true}>
                                    <div className="grid grid-cols-3 gap-4">
                                        {Object.entries(data.memoryAnalysis).map(([key, val]) => (
                                            <div key={key} className="bg-slate-50 rounded-lg p-3 text-center">
                                                <div className="text-xs text-slate-500 mb-1">{key}</div>
                                                <div className={`text-lg font-bold ${val.percent > 90 ? 'text-red-600' : val.percent > 70 ? 'text-yellow-600' : 'text-green-600'}`}>{val.percent}%</div>
                                                <div className="mt-2 h-2 bg-slate-200 rounded-full">
                                                    <div className={`h-full rounded-full ${val.percent > 90 ? 'bg-red-500' : val.percent > 70 ? 'bg-yellow-500' : 'bg-green-500'}`} style={{width:`${val.percent}%`}} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </Section>

                                <Section title="Database" icon={Database} defaultOpen={true}>
                                    <div className="space-y-2">
                                        {data.databaseAnalysis.sessions.map((s, i) => (
                                            <div key={i} className="p-3 bg-slate-50 rounded-lg flex justify-between">
                                                <span className="font-mono text-sm">{s.id}</span>
                                                <span className="text-sm text-slate-600">{s.lastOp}</span>
                                            </div>
                                        ))}
                                        <div className={`p-3 rounded-lg ${data.databaseAnalysis.transactionState === 'open' ? 'bg-yellow-50 border border-yellow-200' : 'bg-green-50'}`}>
                                            <span className="text-sm">Transaction: <strong>{data.databaseAnalysis.transactionState}</strong></span>
                                        </div>
                                    </div>
                                </Section>

                                <Section title="Environment" icon={Server} defaultOpen={true}>
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="bg-slate-50 p-3 rounded-lg">
                                            <div className="text-xs text-slate-500">Version</div>
                                            <div className="font-medium">{data.environment.version}</div>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-lg">
                                            <div className="text-xs text-slate-500">Platform</div>
                                            <div className="font-medium">{data.environment.platform}</div>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-lg">
                                            <div className="text-xs text-slate-500">Database</div>
                                            <div className="font-medium">{data.environment.database}</div>
                                        </div>
                                    </div>
                                </Section>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ========== QUICK ANALYSIS VIEW ==========
        const QuickAnalysisView = ({ data }) => {
            return (
                <div className="space-y-4">
                    {/* Section 1: Root Cause */}
                    <div className="bg-white border border-slate-200 rounded-xl p-5">
                        <h3 className="font-semibold text-slate-800 mb-3 flex items-center gap-2">
                            <div className="p-2 bg-red-100 rounded-lg"><Search className="w-5 h-5 text-red-600" /></div>
                            Root Cause
                        </h3>
                        <p className="text-slate-700 mb-4">{data.rootCause.explanation}</p>
                        <div className="bg-slate-900 rounded-lg p-4">
                            <pre className="text-green-400 font-mono text-sm whitespace-pre-wrap">{data.rootCause.stackTrace.join('\n')}</pre>
                        </div>
                    </div>

                    {/* Section 2: Workaround */}
                    <div className="bg-white border border-slate-200 rounded-xl p-5">
                        <h3 className="font-semibold text-slate-800 mb-3 flex items-center gap-2">
                            <div className="p-2 bg-yellow-100 rounded-lg"><Shield className="w-5 h-5 text-yellow-600" /></div>
                            Immediate Workaround
                        </h3>
                        <ol className="list-decimal list-inside space-y-2 text-slate-700 mb-4">
                            {data.workaround.steps.map((step, i) => (
                                <li key={i}>{step}</li>
                            ))}
                        </ol>
                        <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                            <p className="text-sm text-yellow-800"><Lightbulb className="w-4 h-4 inline mr-1" />{data.workaround.note}</p>
                        </div>
                    </div>

                    {/* Section 3: Solution */}
                    <div className="bg-white border border-slate-200 rounded-xl p-5">
                        <h3 className="font-semibold text-slate-800 mb-3 flex items-center gap-2">
                            <div className="p-2 bg-green-100 rounded-lg"><Wrench className="w-5 h-5 text-green-600" /></div>
                            Solution
                        </h3>
                        {data.solution.fixes.map((fix, i) => (
                            <div key={i} className={`p-4 rounded-lg mb-3 ${fix.priority === 'P0' ? 'bg-red-50 border border-red-200' : 'bg-orange-50 border border-orange-200'}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <div className="flex items-center gap-2">
                                        <span className={`px-2 py-0.5 rounded text-xs font-bold ${fix.priority === 'P0' ? 'bg-red-200 text-red-800' : 'bg-orange-200 text-orange-800'}`}>{fix.priority}</span>
                                        <span className="font-medium text-slate-800">{fix.title}</span>
                                    </div>
                                    <span className="text-xs text-slate-500">{fix.effort}</span>
                                </div>
                                <p className="text-sm text-slate-600 mb-2">{fix.description}</p>
                                {fix.code && (
                                    <pre className="bg-slate-900 text-green-400 p-3 rounded text-xs overflow-x-auto">{fix.code}</pre>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Section 4: Explanation */}
                    <div className="bg-white border border-slate-200 rounded-xl p-5">
                        <h3 className="font-semibold text-slate-800 mb-3 flex items-center gap-2">
                            <div className="p-2 bg-blue-100 rounded-lg"><Lightbulb className="w-5 h-5 text-blue-600" /></div>
                            Why This Fix Works
                        </h3>
                        <p className="text-slate-700 mb-3">{data.explanation.whyItWorks}</p>
                        <ul className="space-y-1">
                            {data.explanation.keyPoints.map((point, i) => (
                                <li key={i} className="flex items-center gap-2 text-sm text-slate-600">
                                    <CheckCircle className="w-4 h-4 text-green-600" />
                                    {point}
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        };

        // ========== MAIN APP ==========
        const App = () => {
            const [analysisType, setAnalysisType] = useState('comprehensive');

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 shadow-sm">
                        <div className="max-w-6xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-blue-600 rounded-lg"><Zap className="w-6 h-6 text-white" /></div>
                                    <div>
                                        <h1 className="text-xl font-bold text-slate-800">Hadron Analysis Types</h1>
                                        <p className="text-sm text-slate-500">Mockup - Comprehensive vs Quick Analysis</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-6xl mx-auto px-6 py-6">
                        {/* Analysis Type Selector */}
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <button onClick={() => setAnalysisType('comprehensive')}
                                className={`p-4 rounded-xl border-2 transition-all ${analysisType === 'comprehensive' ? 'border-blue-500 bg-blue-50' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <span className="font-semibold text-slate-800">Comprehensive Analysis</span>
                                    {analysisType === 'comprehensive' && <CheckCircle className="w-5 h-5 text-blue-600" />}
                                </div>
                                <p className="text-sm text-slate-600 text-left mb-3">Full-depth analysis with memory, database, impact, tests</p>
                                <div className="flex items-center gap-4 text-xs text-slate-500">
                                    <span className="flex items-center gap-1"><DollarSign className="w-3 h-3" />~$2.50</span>
                                    <span className="flex items-center gap-1"><Clock className="w-3 h-3" />15-30s</span>
                                    <span className="flex items-center gap-1"><Layers className="w-3 h-3" />12 sections</span>
                                </div>
                            </button>

                            <button onClick={() => setAnalysisType('quick')}
                                className={`p-4 rounded-xl border-2 transition-all ${analysisType === 'quick' ? 'border-green-500 bg-green-50' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <span className="font-semibold text-slate-800">Quick Analysis</span>
                                    {analysisType === 'quick' && <CheckCircle className="w-5 h-5 text-green-600" />}
                                </div>
                                <p className="text-sm text-slate-600 text-left mb-3">Just the essentials: cause, workaround, fix, explanation</p>
                                <div className="flex items-center gap-4 text-xs text-slate-500">
                                    <span className="flex items-center gap-1"><DollarSign className="w-3 h-3" />~$0.50</span>
                                    <span className="flex items-center gap-1"><Clock className="w-3 h-3" />5-10s</span>
                                    <span className="flex items-center gap-1"><Layers className="w-3 h-3" />4 sections</span>
                                </div>
                            </button>
                        </div>

                        {/* Crash Header */}
                        <div className="bg-white rounded-xl border border-slate-200 p-4 mb-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-red-100 rounded-lg"><AlertTriangle className="w-6 h-6 text-red-600" /></div>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2">
                                        <h2 className="text-lg font-bold text-slate-800">MessageNotUnderstood</h2>
                                        <SeverityBadge severity="critical" />
                                    </div>
                                    <p className="text-sm text-slate-500">WCR_15-1_10-49-30.txt • 2026/01/15 10:49:30</p>
                                </div>
                                <div className="text-right text-sm">
                                    <div className="text-slate-500">User: <span className="font-medium text-slate-800">bertossj</span></div>
                                    <div className="text-slate-500">Site: <span className="font-medium text-slate-800">MTVNL(WONP11)</span></div>
                                </div>
                            </div>
                        </div>

                        {/* Analysis View */}
                        {analysisType === 'comprehensive' ? (
                            <ComprehensiveAnalysisView data={comprehensiveAnalysis} />
                        ) : (
                            <QuickAnalysisView data={quickAnalysis} />
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
