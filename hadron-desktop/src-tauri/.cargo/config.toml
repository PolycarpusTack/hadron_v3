[build]
# Use baseline x86-64 instruction set to avoid ILLEGAL_INSTRUCTION crashes
# on older CPUs that lack AVX/AVX2 support.
rustflags = ["-C", "target-cpu=x86-64"]

# Note on C/C++ dependencies (e.g. bundled SQLite via libsqlite3-sys):
# MSVC x64 defaults to SSE2-only codegen, so no CFLAGS override needed for
# Windows builds. If cross-compiling from Linux with GCC/Clang, set
# CFLAGS="-march=x86-64" in the shell environment.
