                                                {activeTab === 'environment' && (
                                                    <div className="grid grid-cols-2 gap-6">
                                                        <Section title="Application" icon={Monitor} defaultOpen={true}>
                                                            <InfoGrid items={[['User', analysis.environment.user], ['Site', analysis.environment.site], ['Version', analysis.environment.version], ['Build', analysis.environment.build]]} />
                                                        </Section>
                                                        <Section title="Platform" icon={Server} defaultOpen={true}>
                                                            <InfoGrid items={[['Smalltalk', analysis.environment.smalltalkVersion], ['Computer', analysis.environment.computerName], ['Timezone', analysis.environment.timeZone]]} />
                                                        </Section>
                                                        <Section title="Database" icon={Database} defaultOpen={true}>
                                                            <InfoGrid items={[['Server', analysis.environment.oracleServer], ['Client', analysis.environment.oracleClient], ['Encoding', analysis.environment.dbEncoding]]} />
                                                        </Section>
                                                    </div>
                                                )}

                                                {activeTab === 'database' && (
                                                    <div className="space-y-4">
                                                        <Section title="Connections" icon={Database} defaultOpen={true}>
                                                            <table className="w-full text-sm">
                                                                <thead><tr className="bg-slate-100"><th className="px-3 py-2 text-left">Hash</th><th className="px-3 py-2 text-left">State</th><th className="px-3 py-2 text-left">User</th></tr></thead>
                                                                <tbody>
                                                                    {analysis.database.connections.map((c, i) => (
                                                                        <tr key={i} className="border-b"><td className="px-3 py-2 font-mono">{c.hash}</td><td className="px-3 py-2"><span className={`px-2 py-0.5 rounded text-xs ${c.state === 'xactYes' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}`}>{c.state}</span></td><td className="px-3 py-2">{c.username}</td></tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                            {analysis.database.connections.some(c => c.state === 'xactYes') && (
                                                                <div className="mt-3 p-3 bg-yellow-50 border border-yellow-200 rounded">
                                                                    <p className="text-sm text-yellow-800"><strong>⚠️ Warning:</strong> Active transaction - data may not have been saved</p>
                                                                </div>
                                                            )}
                                                        </Section>
                                                    </div>
                                                )}

                                                {activeTab === 'memory' && (
                                                    <div className="space-y-4">
                                                        <div className="grid grid-cols-5 gap-4">
                                                            {[{name:'Eden',...analysis.memory.eden},{name:'Survivor',...analysis.memory.survivor},{name:'Large',...analysis.memory.large},{name:'Old',...analysis.memory.old},{name:'Perm',...analysis.memory.perm}].map(m => (
                                                                <div key={m.name} className={`rounded-lg p-4 text-center ${m.percent >= 100 ? 'bg-amber-50 border border-amber-200' : 'bg-slate-50'}`}>
                                                                    <p className="text-xs text-slate-500 mb-1">{m.name}</p>
                                                                    <p className={`text-lg font-bold ${m.percent >= 100 ? 'text-amber-700' : 'text-slate-800'}`}>{m.percent}%</p>
                                                                    <div className="mt-2 h-2 bg-slate-200 rounded-full"><div className={`h-full rounded-full ${m.percent > 90 ? 'bg-red-500' : m.percent > 70 ? 'bg-yellow-500' : 'bg-green-500'}`} style={{width:`${Math.min(m.percent,100)}%`}} /></div>
                                                                    {m.percent >= 100 && <p className="text-xs text-amber-600 mt-1">⚠️ Full</p>}
                                                                </div>
                                                            ))}
                                                        </div>
                                                        <div className="bg-slate-50 rounded-lg p-4">
                                                            <InfoGrid items={[['Total Used', analysis.memory.total], ['Config Limit', analysis.memory.configLimit]]} />
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="mt-4 bg-white rounded-xl border border-slate-200 p-4">
                                            <h3 className="font-medium text-slate-700 mb-3 flex items-center gap-2"><Monitor className="w-4 h-4" /> Open Windows at Crash</h3>
                                            <div className="grid grid-cols-2 gap-3">
                                                {analysis.windows.map(w => (
                                                    <div key={w.id} className="bg-slate-50 rounded p-3">
                                                        <p className="text-sm text-slate-800 truncate">{w.title}</p>
                                                        <p className="text-xs text-slate-500 font-mono">{w.model}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CrashAnalyzer />, document.getElementById('root'));
    </script>
</body>
</html>
