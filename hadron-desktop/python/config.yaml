# Hadron AI Support Assistant - Configuration
# Week 1 MVP

# AI Provider Configuration
provider: openai  # or 'anthropic' for Claude, 'llamacpp' for local (llama-server)

# OpenAI Settings
model: gpt-4o
# api_key is read from OPENAI_API_KEY environment variable

# Alternative: Anthropic Claude
# provider: anthropic
# model: claude-sonnet-4-20250514
# api_key: ${ANTHROPIC_API_KEY}

# Alternative: Local llama.cpp (free!)
# provider: llamacpp
# model: default
# api_url: http://localhost:8080

# Analysis Settings
temperature: 0.3  # Lower = more consistent (0.0 to 1.0)
max_tokens: 2000  # Maximum response length
max_file_size_kb: 400  # Max crash log size to send to AI (truncates larger files)

# Output Settings
output_dir: results
save_format: json  # json (future: markdown, pdf)

# Large File Handling
# Files larger than max_file_size_kb are intelligently truncated:
#   - Keeps first 50% (error message, stack trace)
#   - Keeps last 25% (recent context)
#   - Adds truncation notice in middle
# This ensures files up to 2MB+ can be analyzed while staying within AI context limits
