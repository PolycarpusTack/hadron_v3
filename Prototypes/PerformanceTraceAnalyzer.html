  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>

    // Icon components using Lucide
    const Icon = ({ name, size = 20, className = "" }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = '';
          const icon = lucide.createElement(lucide.icons[name]);
          icon.setAttribute('width', size);
          icon.setAttribute('height', size);
          if (className.includes('animate-spin')) {
            icon.style.animation = 'spin 1s linear infinite';
          }
          ref.current.appendChild(icon);
        }
      }, [name, size]);
      return <span ref={ref} className={`inline-flex ${className}`} />;
    };

      'performanceTrace_stefano_saggioro_2025-12-05_15-06-34.log': {
        filename: 'performanceTrace_stefano_saggioro_2025-12-05_15-06-34.log',
        user: 'Stefano Saggioro',
        timestamp: '2025-12-05 15:06:34',
        header: { samples: 2661, avgMsPerSample: 112.79, scavenges: 1795, incGCs: 13, stackSpills: 1419, markStackOverflows: 0, weakListOverflows: 0, jitCacheSpills: 80, activeTime: 51.72, otherProcesses: 247.81, realTime: 300.13, profilingOverhead: 0.6 },
        derived: { cpuUtilization: 99.8, smalltalkActivityRatio: 17.3, sampleDensity: 8.9, gcPressure: 0.68 },
        processes: [
          { name: 'Mediagenix Launcher', priority: 50, percentage: 83.8, status: 'normal' },
          { name: 'IdleLoopProcess', priority: 10, percentage: 8.6, status: 'warning' },
          { name: 'FinalizationProcess', priority: 98, percentage: 3.0, status: 'normal' },
          { name: 'ScavengeProcess', priority: 90, percentage: 1.4, status: 'normal' },
          { name: 'primitives', priority: '-', percentage: 1.4, status: 'normal' }
        ],
        topMethods: [
          { method: 'ObjectMemory class>>primMeasureIGCIsInterruptible:objects:bytes:', percentage: 8.9, category: 'GC' },
          { method: 'ExternalMethod class>>primCallC:specifierCallFlags:arguments:...', percentage: 7.9, category: 'FFI/External' },
          { method: 'GraphicsContext>>paint:', percentage: 6.6, category: 'Graphics' },
          { method: 'WeakArray class>>queueOverflowSignal', percentage: 3.0, category: 'GC' },
          { method: 'MAFColumnDefinition>>displayColumnSeparatorLineIn:on:bounds:...', percentage: 2.4, category: 'UI Rendering' },
          { method: 'OrderedCollection>>do:', percentage: 1.7, category: 'Collection' },

        ],
        patterns: [
          { type: 'changelog_sync', severity: 'high', title: 'Change Log Synchronization', description: 'T3ChangeLogSynchronizer at 39.3% - significant multi-user sync activity continues from earlier session.', confidence: 95 },

        recommendations: [

    };

    // Severity badge component
    const SeverityBadge = ({ severity }) => {
      const config = {
        critical: 'bg-red-100 text-red-800 border-red-300',
        high: 'bg-orange-100 text-orange-800 border-orange-300',
        medium: 'bg-yellow-100 text-yellow-800 border-yellow-300',
        low: 'bg-blue-100 text-blue-800 border-blue-300',
        info: 'bg-gray-100 text-gray-700 border-gray-300',
        normal: 'bg-green-100 text-green-800 border-green-300',
        warning: 'bg-yellow-100 text-yellow-800 border-yellow-300'
      };
      return <span className={`px-2 py-0.5 text-xs font-medium rounded-full border ${config[severity] || config.info}`}>{severity.toUpperCase()}</span>;
    };

    // Category badge component
    const CategoryBadge = ({ category }) => {
      const colors = {
        'FFI/External': 'bg-purple-100 text-purple-800',
        'Graphics': 'bg-pink-100 text-pink-800',
        'GC': 'bg-orange-100 text-orange-800',
        'Database': 'bg-blue-100 text-blue-800',
        'UI Rendering': 'bg-indigo-100 text-indigo-800',
        'Collection': 'bg-green-100 text-green-800',
        'Session': 'bg-cyan-100 text-cyan-800'
      };
      return <span className={`px-2 py-0.5 text-xs font-medium rounded ${colors[category] || 'bg-gray-100 text-gray-800'}`}>{category}</span>;
    };

    // Metric card component
    const MetricCard = ({ icon, label, value, unit, status, subtext }) => (
      <div className={`bg-white rounded-lg border p-3 ${status === 'warning' ? 'border-yellow-300 bg-yellow-50' : status === 'error' ? 'border-red-300 bg-red-50' : 'border-gray-200'}`}>
        <div className="flex items-center gap-2 text-gray-500 mb-1">
          <Icon name={icon} size={14} />
          <span className="text-xs font-medium uppercase tracking-wide">{label}</span>
        </div>
        <div className="flex items-baseline gap-1">
          <span className="text-xl font-bold text-gray-900">{value}</span>
          {unit && <span className="text-sm text-gray-500">{unit}</span>}
        </div>
        {subtext && <p className="text-xs text-gray-500 mt-1">{subtext}</p>}
      </div>
    );

    // Progress bar component
    const ProgressBar = ({ value, max = 100, color = 'blue', height = 'h-2' }) => {
      const percentage = Math.min((value / max) * 100, 100);
      const colors = {
        blue: 'bg-blue-500',
        green: 'bg-green-500',
        yellow: 'bg-yellow-500',
        orange: 'bg-orange-500',
        red: 'bg-red-500',
        purple: 'bg-purple-500'
      };
      return (
        <div className={`w-full bg-gray-200 rounded-full ${height}`}>
          <div className={`${colors[color]} ${height} rounded-full transition-all duration-500`} style={{ width: `${percentage}%` }} />
        </div>
      );
    };

    // Collapsible section component
    const CollapsibleSection = ({ title, icon, children, defaultOpen = true, badge }) => {
      const [isOpen, setIsOpen] = useState(defaultOpen);
      return (
        <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
          <button onClick={() => setIsOpen(!isOpen)} className="w-full px-4 py-3 flex items-center justify-between bg-gray-50 hover:bg-gray-100 transition-colors">
            <div className="flex items-center gap-3">
              <Icon name={icon} size={18} className="text-gray-600" />
              <span className="font-semibold text-gray-800">{title}</span>
              {badge}
            </div>
            <Icon name={isOpen ? "ChevronDown" : "ChevronRight"} size={18} className="text-gray-400" />
          </button>
          {isOpen && <div className="p-4 border-t border-gray-200">{children}</div>}
        </div>
      );
    };

    // File upload component
    const FileUpload = ({ onFilesSelected, files, onRemoveFile, isAnalyzing }) => {
      const [isDragging, setIsDragging] = useState(false);

      const handleDrag = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === 'dragenter' || e.type === 'dragover') {
          setIsDragging(true);
        } else if (e.type === 'dragleave') {
          setIsDragging(false);
        }
      }, []);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        e.stopPropagation();
        setIsDragging(false);
        const droppedFiles = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.log'));
        if (droppedFiles.length > 0) {
          onFilesSelected(droppedFiles);
        }
      }, [onFilesSelected]);

      const handleFileInput = (e) => {
        const selectedFiles = Array.from(e.target.files);
        if (selectedFiles.length > 0) {
          onFilesSelected(selectedFiles);
        }
      };

      return (
        <div className="space-y-4">
          <div
            onDragEnter={handleDrag}
            onDragLeave={handleDrag}
            onDragOver={handleDrag}
            onDrop={handleDrop}
            className={`border-2 border-dashed rounded-xl p-8 text-center transition-all ${isDragging ? 'border-blue-500 bg-blue-50' : 'border-gray-300 hover:border-gray-400 bg-gray-50'}`}
          >
            <Icon name="Upload" size={48} className={`mx-auto mb-4 ${isDragging ? 'text-blue-500' : 'text-gray-400'}`} />
            <p className="text-lg font-medium text-gray-700 mb-2">Drop performance trace files here</p>
            <p className="text-sm text-gray-500 mb-4">or click to browse • Supports .log files • Batch upload supported</p>
            <label className="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer transition-colors">
              <Icon name="FileText" size={18} />
              <span>Select Files</span>
              <input type="file" multiple accept=".log" onChange={handleFileInput} className="hidden" />
            </label>
          </div>

          {files.length > 0 && (
            <div className="space-y-2">
              <p className="text-sm font-medium text-gray-700">{files.length} file(s) selected:</p>
              {files.map((file, index) => (
                <div key={index} className="flex items-center justify-between bg-white border border-gray-200 rounded-lg px-4 py-2">
                  <div className="flex items-center gap-3">
                    <Icon name="FileText" size={20} className="text-blue-500" />
                    <div>
                      <p className="font-medium text-gray-800">{file.name}</p>
                      <p className="text-xs text-gray-500">{(file.size / 1024).toFixed(1)} KB</p>
                    </div>
                  </div>
                  <button onClick={() => onRemoveFile(index)} disabled={isAnalyzing} className="p-1 text-gray-400 hover:text-red-500 disabled:opacity-50">
                    <Icon name="Trash2" size={18} />
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // Analysis result component
    const AnalysisResult = ({ result }) => {
      const getColorForPercentage = (pct) => {
        if (pct >= 20) return 'red';
        if (pct >= 10) return 'orange';
        if (pct >= 5) return 'yellow';
        return 'blue';
      };

      return (
        <div className="space-y-4">
          {/* Header Summary */}
          <div className="bg-gradient-to-r from-slate-800 to-slate-700 rounded-xl p-5 text-white">
            <div className="flex items-start justify-between flex-wrap gap-2">
              <div>
                <h2 className="text-lg font-bold mb-1">{result.filename}</h2>
                <p className="text-slate-300 text-sm">User: {result.user} • {result.timestamp}</p>
              </div>
              <SeverityBadge severity={result.overallSeverity} />
            </div>
            <p className="mt-3 text-slate-200 text-sm">{result.summary}</p>
          </div>

          {/* Header Statistics */}
          <CollapsibleSection title="Header Statistics" icon="BarChart3">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <MetricCard icon="Cpu" label="Samples" value={result.header.samples.toLocaleString()} subtext={`${result.header.avgMsPerSample.toFixed(1)} ms/sample avg`} />
              <MetricCard icon="Clock" label="Real Time" value={result.header.realTime.toFixed(1)} unit="sec" subtext="Profiling duration" />
              <MetricCard icon="Zap" label="Active Time" value={result.header.activeTime.toFixed(1)} unit="sec" subtext={`${result.derived.smalltalkActivityRatio.toFixed(1)}% of total`} />
              <MetricCard icon="RefreshCw" label="GC Events" value={result.header.scavenges + result.header.incGCs} subtext={`${result.header.scavenges} scav, ${result.header.incGCs} incGC`} status={result.header.scavenges > 5000 ? 'warning' : 'normal'} />
            </div>
            
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
              <div className="bg-gray-50 rounded-lg p-2 text-center">
                <p className="text-xs text-gray-500">Stack Spills</p>
                <p className="text-sm font-semibold">{result.header.stackSpills.toLocaleString()}</p>
              </div>
              <div className="bg-gray-50 rounded-lg p-2 text-center">
                <p className="text-xs text-gray-500">Mark Stack Overflows</p>
                <p className={`text-sm font-semibold ${result.header.markStackOverflows > 0 ? 'text-red-600' : ''}`}>{result.header.markStackOverflows}</p>
              </div>
              <div className="bg-gray-50 rounded-lg p-2 text-center">
                <p className="text-xs text-gray-500">Weak List Overflows</p>
                <p className={`text-sm font-semibold ${result.header.weakListOverflows > 0 ? 'text-red-600' : ''}`}>{result.header.weakListOverflows}</p>
              </div>
              <div className="bg-gray-50 rounded-lg p-2 text-center">
                <p className="text-xs text-gray-500">JIT Cache Spills</p>
                <p className="text-sm font-semibold">{result.header.jitCacheSpills}</p>
              </div>
            </div>

            <div className="p-3 bg-blue-50 rounded-lg border border-blue-200">
              <h4 className="font-medium text-blue-900 mb-2 text-sm">Derived Metrics</h4>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <div><p className="text-blue-700 text-xs">CPU Utilization</p><p className="font-bold text-blue-900">{result.derived.cpuUtilization.toFixed(1)}%</p></div>
                <div><p className="text-blue-700 text-xs">Smalltalk Activity</p><p className="font-bold text-blue-900">{result.derived.smalltalkActivityRatio.toFixed(1)}%</p></div>
                <div><p className="text-blue-700 text-xs">Sample Density</p><p className="font-bold text-blue-900">{result.derived.sampleDensity.toFixed(1)}/sec</p></div>
                <div><p className="text-blue-700 text-xs">GC Pressure</p><p className="font-bold text-blue-900">{result.derived.gcPressure.toFixed(2)}</p></div>
              </div>
            </div>
          </CollapsibleSection>

          {/* Process Distribution */}
          <CollapsibleSection title="Process Distribution" icon="GitBranch">
            <div className="space-y-2">
              {result.processes.map((proc, i) => (
                <div key={i} className="flex items-center gap-3">
                  <div className="w-36 flex items-center gap-2 flex-shrink-0">
                    <span className="font-medium text-gray-800 text-sm truncate">{proc.name}</span>
                  </div>
                  {proc.status !== 'normal' && <SeverityBadge severity={proc.status} />}
                  <div className="flex-1 min-w-0">
                    <ProgressBar value={proc.percentage} color={proc.percentage > 15 && proc.name !== 'Mediagenix Launcher' ? 'orange' : 'blue'} />
                  </div>
                  <div className="w-16 text-right flex-shrink-0">
                    <span className="font-mono text-sm font-medium">{proc.percentage.toFixed(1)}%</span>
                  </div>
                  <div className="w-10 text-right flex-shrink-0">
                    <span className="text-xs text-gray-500">@{proc.priority}</span>
                  </div>
                </div>
              ))}
            </div>
          </CollapsibleSection>

          {/* Top Methods (Totals) */}
          <CollapsibleSection title="Top Methods by Self-Time" icon="List">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-200">
                    <th className="text-left py-2 px-2 font-medium text-gray-600">Method</th>
                    <th className="text-left py-2 px-2 font-medium text-gray-600">Category</th>
                    <th className="text-right py-2 px-2 font-medium text-gray-600">Self-Time</th>
                    <th className="text-left py-2 px-2 font-medium text-gray-600 w-24">Visual</th>
                  </tr>
                </thead>
                <tbody>
                  {result.topMethods.map((method, i) => (
                    <tr key={i} className="border-b border-gray-100 hover:bg-gray-50">
                      <td className="py-2 px-2 font-mono text-xs text-gray-800 max-w-xs truncate" title={method.method}>{method.method}</td>
                      <td className="py-2 px-2"><CategoryBadge category={method.category} /></td>
                      <td className="py-2 px-2 text-right font-medium">{method.percentage.toFixed(1)}%</td>
                      <td className="py-2 px-2"><ProgressBar value={method.percentage} max={15} color={getColorForPercentage(method.percentage)} height="h-1.5" /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </CollapsibleSection>

          {/* Detected Patterns */}
          <CollapsibleSection title="Detected Patterns" icon="Target" badge={<span className="ml-2 px-2 py-0.5 text-xs bg-blue-100 text-blue-800 rounded-full">{result.patterns.length} found</span>}>
            <div className="space-y-3">
              {result.patterns.map((pattern, i) => (
                <div key={i} className={`p-3 rounded-lg border ${
                  pattern.severity === 'high' ? 'bg-orange-50 border-orange-200' :
                  pattern.severity === 'medium' ? 'bg-yellow-50 border-yellow-200' :
                  pattern.severity === 'low' ? 'bg-blue-50 border-blue-200' :
                  'bg-gray-50 border-gray-200'
                }`}>
                  <div className="flex items-start justify-between mb-1 flex-wrap gap-2">
                    <div className="flex items-center gap-2">
                      {pattern.severity === 'high' && <Icon name="AlertTriangle" size={16} className="text-orange-600" />}
                      {pattern.severity === 'medium' && <Icon name="AlertCircle" size={16} className="text-yellow-600" />}
                      {pattern.severity === 'low' && <Icon name="Info" size={16} className="text-blue-600" />}
                      {pattern.severity === 'info' && <Icon name="Info" size={16} className="text-gray-600" />}
                      <h4 className="font-semibold text-gray-800">{pattern.title}</h4>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-500">{pattern.confidence}% confidence</span>
                      <SeverityBadge severity={pattern.severity} />
                    </div>
                  </div>
                  <p className="text-sm text-gray-700">{pattern.description}</p>
                </div>
              ))}
            </div>
          </CollapsibleSection>

          {/* User Scenario Reconstruction */}
          <CollapsibleSection title="User Scenario Reconstruction" icon="MousePointer">
            <div className="space-y-3">
              <div className="grid md:grid-cols-2 gap-3">
                <div className="bg-gray-50 rounded-lg p-3">
                  <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Trigger Event</p>
                  <p className="font-medium text-gray-800">{result.scenario.trigger}</p>
                </div>
                <div className="bg-gray-50 rounded-lg p-3">
                  <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Impact</p>
                  <p className="font-medium text-gray-800">{result.scenario.impact}</p>
                </div>
              </div>
              
              <div className="bg-blue-50 rounded-lg p-3 border border-blue-200">
                <p className="text-xs font-medium text-blue-600 uppercase tracking-wide mb-1">What Happened</p>
                <p className="text-gray-800">{result.scenario.action}</p>
                <p className="text-sm text-gray-600 mt-2">{result.scenario.context}</p>
              </div>

              {result.scenario.additionalFactors.length > 0 && (
                <div>
                  <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Contributing Factors</p>
                  <ul className="space-y-1">
                    {result.scenario.additionalFactors.map((factor, i) => (
                      <li key={i} className="flex items-start gap-2 text-sm text-gray-700">
                        <span className="text-gray-400 mt-0.5">•</span>
                        {factor}
                      </li>
                    ))}
                  </ul>
                </div>
              )}
            </div>
          </CollapsibleSection>

          {/* Recommendations */}
          <CollapsibleSection title="Recommendations" icon="Lightbulb">
            <div className="space-y-2">
              {result.recommendations.map((rec, i) => (
                <div key={i} className="flex items-start gap-3 p-3 bg-white border border-gray-200 rounded-lg hover:shadow-sm transition-shadow">
                  <div className={`p-2 rounded-lg flex-shrink-0 ${
                    rec.type === 'optimization' ? 'bg-purple-100' :
                    rec.type === 'workaround' ? 'bg-green-100' :
                    rec.type === 'investigation' ? 'bg-blue-100' :
                    rec.type === 'configuration' ? 'bg-orange-100' :
                    'bg-gray-100'
                  }`}>
                    {rec.type === 'optimization' && <Icon name="TrendingUp" size={18} className="text-purple-600" />}
                    {rec.type === 'workaround' && <Icon name="CheckCircle" size={18} className="text-green-600" />}
                    {rec.type === 'investigation' && <Icon name="Target" size={18} className="text-blue-600" />}
                    {rec.type === 'configuration' && <Icon name="RefreshCw" size={18} className="text-orange-600" />}
                    {rec.type === 'documentation' && <Icon name="FileText" size={18} className="text-gray-600" />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                      <h4 className="font-semibold text-gray-800">{rec.title}</h4>
                      <SeverityBadge severity={rec.priority} />
                    </div>
                    <p className="text-sm text-gray-600">{rec.description}</p>
                    <p className="text-xs text-gray-400 mt-1">Effort: {rec.effort}</p>
                  </div>
                </div>
              ))}
            </div>
          </CollapsibleSection>
        </div>
      );
    };

    // Main Application
    function PerformanceTraceAnalyzer() {
      const [files, setFiles] = useState([]);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [analysisResults, setAnalysisResults] = useState([]);
      const [activeTab, setActiveTab] = useState(0);

      const demoFiles = [
        { name: 'performanceTrace_marcello_venditti_2025-12-10_15-52-46.log', size: 1025024 },
        { name: 'performanceTrace_stefano_saggioro_2025-12-05_12-16-12.log', size: 650240 },
        { name: 'performanceTrace_stefano_saggioro_2025-12-05_15-06-34.log', size: 458752 }
      ];

      const handleFilesSelected = (newFiles) => {
        setFiles(prev => [...prev, ...newFiles]);
      };

      const handleRemoveFile = (index) => {
        setFiles(prev => prev.filter((_, i) => i !== index));
      };

      const loadDemoFiles = () => {
        setFiles(demoFiles);
        setAnalysisResults([]);
      };

      const handleAnalyze = async () => {
        setIsAnalyzing(true);
        setAnalysisResults([]);
        
        for (let i = 0; i < files.length; i++) {
          await new Promise(resolve => setTimeout(resolve, 1500));
          
          const mockResult = mockAnalysisResults[files[i].name] || {
            ...mockAnalysisResults['performanceTrace_marcello_venditti_2025-12-10_15-52-46.log'],
            filename: files[i].name,
            user: 'Unknown User',
            timestamp: new Date().toISOString().replace('T', ' ').slice(0, 19)
          };
          
          setAnalysisResults(prev => [...prev, mockResult]);
        }
        
        setIsAnalyzing(false);
        setActiveTab(0);
      };

      const handleReset = () => {
        setFiles([]);
        setAnalysisResults([]);
        setActiveTab(0);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
          {/* Header */}
          <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-blue-600 rounded-lg">
                    <Icon name="Cpu" size={22} className="text-white" />
                  </div>
                  <div>
                    <h1 className="text-lg font-bold text-gray-900">Performance Trace Analyzer</h1>
                    <p className="text-xs text-gray-500">VisualWorks Smalltalk / MediaGenix WHATS'ON</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  {files.length === 0 && (
                    <button onClick={loadDemoFiles} className="flex items-center gap-2 px-3 py-1.5 text-sm text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                      <Icon name="Play" size={14} />
                      <span>Load Demo</span>
                    </button>
                  )}
                  {analysisResults.length > 0 && (
                    <button onClick={handleReset} className="flex items-center gap-2 px-3 py-1.5 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors">
                      <Icon name="RefreshCw" size={14} />
                      <span>New Analysis</span>
                    </button>
                  )}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6">
            {analysisResults.length === 0 ? (
              /* Upload Section */
              <div className="max-w-2xl mx-auto space-y-6">
                <div className="text-center mb-6">
                  <h2 className="text-2xl font-bold text-gray-800 mb-2">Upload Performance Traces</h2>
                  <p className="text-gray-600">
                    Upload one or more .log files to analyze CPU profiles, identify bottlenecks, 
                    and receive actionable recommendations.
                  </p>
                </div>

                <FileUpload
                  onFilesSelected={handleFilesSelected}
                  files={files}
                  onRemoveFile={handleRemoveFile}
                  isAnalyzing={isAnalyzing}
                />

                {files.length > 0 && (
                  <div className="flex justify-center">
                    <button
                      onClick={handleAnalyze}
                      disabled={isAnalyzing}
                      className="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-blue-400 disabled:cursor-not-allowed transition-colors font-medium"
                    >
                      {isAnalyzing ? (
                        <>
                          <Icon name="RefreshCw" size={20} className="animate-spin" />
                          <span>Analyzing...</span>
                        </>
                      ) : (
                        <>
                          <Icon name="Play" size={20} />
                          <span>Analyze {files.length} File{files.length > 1 ? 's' : ''}</span>
                        </>
                      )}
                    </button>
                  </div>
                )}

                {isAnalyzing && (
                  <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <div className="flex items-center gap-3">
                      <Icon name="RefreshCw" size={20} className="text-blue-600 animate-spin" />
                      <div>
                        <p className="font-medium text-blue-900">
                          Analyzing {analysisResults.length + 1} of {files.length}...
                        </p>
                        <p className="text-sm text-blue-700">
                          Parsing header statistics, building call tree, detecting patterns
                        </p>
                      </div>
                    </div>
                  </div>
                )}

                {/* Feature highlights */}
                <div className="grid md:grid-cols-3 gap-4 mt-8">
                  <div className="bg-white rounded-lg p-5 border border-gray-200">
                    <Icon name="BarChart3" size={24} className="text-blue-600 mb-3" />
                    <h3 className="font-semibold text-gray-800 mb-1">Comprehensive Metrics</h3>
                    <p className="text-sm text-gray-600">Full breakdown of samples, GC activity, memory stats, and derived performance indicators.</p>
                  </div>
                  <div className="bg-white rounded-lg p-5 border border-gray-200">
                    <Icon name="Target" size={24} className="text-purple-600 mb-3" />
                    <h3 className="font-semibold text-gray-800 mb-1">Pattern Detection</h3>
                    <p className="text-sm text-gray-600">Automatic identification of UI bottlenecks, database issues, sync overhead, and memory pressure.</p>
                  </div>
                  <div className="bg-white rounded-lg p-5 border border-gray-200">
                    <Icon name="Lightbulb" size={24} className="text-green-600 mb-3" />
                    <h3 className="font-semibold text-gray-800 mb-1">Actionable Insights</h3>
                    <p className="text-sm text-gray-600">Prioritized recommendations with effort estimates for code fixes, workarounds, and user guidance.</p>
                  </div>
                </div>
              </div>
            ) : (
              /* Results Section */
              <div className="space-y-4">
                {/* Tabs for multiple files */}
                {analysisResults.length > 1 && (
                  <div className="flex gap-2 overflow-x-auto pb-2">
                    {analysisResults.map((result, i) => (
                      <button
                        key={i}
                        onClick={() => setActiveTab(i)}
                        className={`flex items-center gap-2 px-4 py-2 rounded-lg whitespace-nowrap transition-colors ${
                          activeTab === i
                            ? 'bg-blue-600 text-white'
                            : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50'
                        }`}
                      >
                        <Icon name="FileText" size={16} />
                        <span className="text-sm font-medium">{result.user}</span>
                        <SeverityBadge severity={result.overallSeverity} />
                      </button>
                    ))}
                  </div>
                )}

                {/* Active result */}
                <AnalysisResult result={analysisResults[activeTab]} />

                {/* Export options */}
                <div className="flex justify-end gap-3 pt-4 border-t border-gray-200">
                  <button className="flex items-center gap-2 px-4 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    <Icon name="Download" size={18} />
                    <span>Export PDF</span>
                  </button>
                  <button className="flex items-center gap-2 px-4 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    <Icon name="Download" size={18} />
                    <span>Export JSON</span>
                  </button>
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="border-t border-gray-200 bg-white mt-8">
            <div className="max-w-6xl mx-auto px-4 py-4 text-center text-sm text-gray-500">
              Performance Trace Analyzer • For VisualWorks Smalltalk applications • MediaGenix WHATS'ON
            </div>
          </footer>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PerformanceTraceAnalyzer />);
  </script>
</body>
</html>
